<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sax Ear Trainer</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #2c3e50;
      color: #ecf0f1;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 { color: #3498db; }
    #game-info {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    #combo-message {
      font-size: 1.5rem;
      font-weight: bold;
      color: #f1c40f;
      height: 30px;
    }
    #message {
      font-size: 1.2rem;
      margin: 20px 0;
      height: 30px;
    }
    .key-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }
    .key-btn {
      background-color: #34495e;
      color: #fff;
      border: 2px solid #2c3e50;
      border-radius: 8px;
      padding: 15px 20px;
      font-size: 1.2rem;
      cursor: pointer;
      min-width: 60px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background-color 0.1s, transform 0.1s;
    }
    .key-btn:active, .key-btn.active {
      background-color: #e74c3c;
      transform: translateY(2px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    #start-btn {
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 15px 40px;
      font-size: 1.5rem;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #start-btn:active {
      transform: translateY(2px);
    }
    #result-area {
      margin-top: 30px;
      background-color: #34495e;
      padding: 20px;
      border-radius: 10px;
      display: none;
    }
    #rank-title { font-size: 2rem; font-weight: bold; margin: 10px 0; }
    #rank-desc { font-size: 1.1rem; }
  </style>
</head>
<body>

  <h1>Sax Ear Trainer</h1>
  
  <div id="game-info">
    <div>⏳ 残り時間: <span id="time-display">60</span>秒</div>
    <div>🎵 スコア: <span id="score-display">0</span>点</div>
  </div>
  
  <div id="combo-message"></div>
  <div id="message">スタートボタンを押して開始！</div>

  <button id="start-btn" onclick="startGame()">スタート</button>

  <div class="key-container" id="keys-container" style="display: none;">
    <button class="key-btn" onclick="handleInput('A')" id="btn-A">A (ド)</button>
    <button class="key-btn" onclick="handleInput('S')" id="btn-S">S (レ)</button>
    <button class="key-btn" onclick="handleInput('D')" id="btn-D">D (ミ)</button>
    <button class="key-btn" onclick="handleInput('F')" id="btn-F">F (ファ)</button>
    <button class="key-btn" onclick="handleInput('J')" id="btn-J">J (ソ)</button>
    <button class="key-btn" onclick="handleInput('K')" id="btn-K">K (ラ)</button>
    <button class="key-btn" onclick="handleInput('L')" id="btn-L">L (シ)</button>
    <button class="key-btn" onclick="handleInput(';')" id="btn-;">; (ド↑)</button>
  </div>

  <div id="result-area">
    <h2>ゲーム終了！</h2>
    <p>最終スコア: <span id="final-score" style="font-size:1.5rem; font-weight:bold;">0</span> 点</p>
    <div id="rank-title"></div>
    <div id="rank-desc"></div>
    <button id="start-btn" onclick="location.reload()" style="font-size:1rem; padding:10px 20px; margin-top:15px;">もう一度プレイ</button>
  </div>

  <script>
    // --- 状態管理 ---
    let score = 0;
    let combo = 0;
    let timeLeft = 60;
    let timerInterval;
    let isPlaying = false;
    let startTime = 0;
    let currentNote = null;
    let basePoints = 100;
    
    // Web Audio API
    let audioCtx = null;

    // 音階データ（Cメジャースケール）
    const noteData = {
      'A': { name: 'ド', freq: 261.63 },
      'S': { name: 'レ', freq: 293.66 },
      'D': { name: 'ミ', freq: 329.63 },
      'F': { name: 'ファ', freq: 349.23 },
      'J': { name: 'ソ', freq: 392.00 },
      'K': { name: 'ラ', freq: 440.00 },
      'L': { name: 'シ', freq: 493.88 },
      ';': { name: 'ド↑', freq: 523.25 }
    };
    const noteKeys = Object.keys(noteData);

    // --- 音を鳴らす関数 ---
    function playTone(freq) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = 'sine'; // サックスに近い音色にする場合は後々波形を変えられます
      osc.frequency.value = freq;
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
      osc.stop(audioCtx.currentTime + 1);
    }

    // --- ゲーム開始 ---
    function startGame() {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      
      score = 0;
      combo = 0;
      timeLeft = 60;
      isPlaying = true;
      
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('keys-container').style.display = 'flex';
      document.getElementById('result-area').style.display = 'none';
      
      updateDisplay();
      
      timerInterval = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) endGame();
      }, 1000);
      
      nextNote();
    }

    // --- 次の音を出題 ---
    function nextNote() {
      if (!isPlaying) return;
      const randomIdx = Math.floor(Math.random() * noteKeys.length);
      currentNote = noteKeys[randomIdx];
      playTone(noteData[currentNote].freq);
      startTime = performance.now(); // 速度計測の開始
      document.getElementById('message').innerText = "何の音？";
    }

    // --- 入力処理 ---
    function handleInput(key) {
      if (!isPlaying || !currentNote) return;
      
      // キーボードの見た目を光らせる
      const btn = document.getElementById(`btn-${key}`);
      if(btn) {
        btn.classList.add('active');
        setTimeout(() => btn.classList.remove('active'), 100);
      }

      checkAnswer(key === currentNote);
    }

    // --- 【修正箇所】判定ロジック（Safari対策 ＆ 追加時間） ---
    function checkAnswer(isCorrect) {
      let responseTime = performance.now() - startTime;
      let msgHTML = "";

      if (isCorrect) {
        // ① iOS（iPhone/iPad）またはSafariかどうかを判定
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        
        // ② 端末に合わせてコンボの制限時間を切り替え (1000ms or 800ms)
        const comboTimeLimit = (isIOS || isSafari) ? 1000 : 800;

        // ③ 判定と追加秒数ロジック
        if (responseTime <= comboTimeLimit) {
          combo++;
          let speedMultiplier = Math.min(1.0 + (combo * 0.2), 3.0);
          let finalPoints = Math.floor(basePoints * speedMultiplier);
          msgHTML = `<span style="color:#2ecc71">⭕ 正解！</span> <span style="color:#f1c40f">⚡ FAST!! (+${finalPoints}点 / 速度x${speedMultiplier.toFixed(1)})</span>`;
          score += finalPoints;

          // 3の倍数の時だけ判定し、コンボ数に応じて追加時間を変える
          if (combo > 0 && combo % 3 === 0) {
            if (combo >= 9) {
              timeLeft += 4; document.getElementById('combo-message').innerText = "⏰ +4秒!";
            } else if (combo === 6) {
              timeLeft += 3; document.getElementById('combo-message').innerText = "⏰ +3秒!";
            } else if (combo === 3) {
              timeLeft += 2; document.getElementById('combo-message').innerText = "⏰ +2秒!";
            }
          }
        } else {
          // コンボが切れた場合
          combo = 0; 
          score += basePoints; 
          msgHTML = `<span style="color:#2ecc71">⭕ 正解！ (+${basePoints}点)</span>`;
          document.getElementById('combo-message').innerText = "";
        }
        
        document.getElementById('message').innerHTML = msgHTML;
        updateDisplay();
        setTimeout(nextNote, 300); // 少し待ってから次の音
        
      } else {
        // 不正解の場合
        combo = 0;
        document.getElementById('combo-message').innerText = "";
        document.getElementById('message').innerHTML = `<span style="color:#e74c3c">❌ ブブー！（正解は ${noteData[currentNote].name}）</span>`;
        updateDisplay();
        // 音を覚えさせるために正解の音を鳴らし直す
        playTone(noteData[currentNote].freq);
        setTimeout(nextNote, 800);
      }
    }

    // --- ゲーム終了と評価 ---
    function endGame() {
      isPlaying = false;
      clearInterval(timerInterval);
      document.getElementById('keys-container').style.display = 'none';
      document.getElementById('message').innerText = "";
      document.getElementById('combo-message').innerText = "";
      
      document.getElementById('result-area').style.display = 'block';
      document.getElementById('final-score').innerText = score;

      // 【修正箇所】カタカナの評価ランク
      let rankName = ""; let rankColor = ""; let rankDesc = "";

      if (score < 6000) { 
        rankName = "🥉 ビギナー"; rankColor = "#cd7f32"; 
        rankDesc = "近い音程の距離感が掴めてきたレベル"; 
      }
      else if (score < 12000) { 
        rankName = "🥈 レギュラー"; rankColor = "#bdc3c7"; 
        rankDesc = "1オクターブ内の跳躍に迷いがなくなってきたレベル"; 
      }
      else if (score < 20000) { 
        rankName = "🏅 ベテラン"; rankColor = "#3498db"; 
        rankDesc = "拡張レンジでの跳躍にも素早く反応できる、瞬時の判断力が身についてきた証！"; 
      }
      else if (score < 35000) { 
        rankName = "🥇 エキスパート"; rankColor = "#f1c40f"; 
        rankDesc = "基準のドに対する相対音感が強固になり、ほぼノータイムで音が取れるレベル"; 
      }
      else if (score < 50000) { 
        rankName = "👑 マスター"; rankColor = "#e67e22"; 
        rankDesc = "考えなくても指が動く、完璧な相対音感と反射神経の持ち主"; 
      }
      else { 
        rankName = "✨ 神の耳"; rankColor = "#ff4500"; 
        rankDesc = "システムと完全に同化。限界スピードでの連続正解を維持できる究極の耳！"; 
      }

      document.getElementById('rank-title').innerText = rankName;
      document.getElementById('rank-title').style.color = rankColor;
      document.getElementById('rank-desc').innerText = rankDesc;
    }

    // --- 表示の更新 ---
    function updateDisplay() {
      document.getElementById('time-display').innerText = timeLeft;
      document.getElementById('score-display').innerText = score;
    }

    // --- キーボード入力の受付（PC用） ---
    document.addEventListener('keydown', (event) => {
      const key = event.key.toUpperCase();
      if (noteKeys.includes(key)) {
        handleInput(key);
      }
    });
  </script>
</body>
</html>
